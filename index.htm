<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile Sign In</title>
  <link rel="stylesheet" href="assets/css/ourspace-auth.css" />

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#00ffff">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="OurSpace">
<meta name="mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="css/ourspace-pwa.css">
<link rel="stylesheet" href="css/ourspace-module-workshop.css">
</head>
<body class="auth-page">
  <main class="auth-shell" aria-labelledby="page-title">
    <section class="brand-panel" aria-label="Profiles">
      <div class="brand-topline">
        <span class="brand-mark">A place to breathe, live, & love authentically</span>
        <div class="profile-mini-nav" aria-label="Profiles">
        </div>
      </div>

      <div class="brand-hero">
        <h1 id="page-title" class="ourspace-title">OurSpace</h1>
        <div class="profile-cards" aria-label="Allowed profiles">
          <article class="profile-card jasper-card">
            <span class="profile-icon" aria-hidden="true">✦</span>
            <h2>Squishy Cottage</h2>
            <p>Jasper</p>
          </article>
          <article class="profile-card william-card">
            <span class="profile-icon" aria-hidden="true">✧</span>
            <h2>Dino Nerdzone</h2>
            <p>William</p>
          </article>
        </div>
      </div>
    </section>

    <section class="form-panel" aria-label="Sign in or sign up">
      <div class="tabs" role="tablist" aria-label="Authentication options">
        <button class="tab active" type="button" role="tab" aria-selected="true" aria-controls="signin-panel" data-auth-tab="signin">Sign in</button>
        <button class="tab" type="button" role="tab" aria-selected="false" aria-controls="signup-panel" data-auth-tab="signup">Sign up</button>
        <button class="tab" type="button" role="tab" aria-selected="false" aria-controls="reset-panel" data-auth-tab="reset">Reset</button>
      </div>

      <div id="status" class="status" role="status" aria-live="polite"></div>

      <section id="signin-panel" class="auth-panel active" role="tabpanel">
        <h2>Sign in</h2>
        <form id="signin-form" class="auth-form" autocomplete="on" action="dino-nerdzone.html" method="get">
          <label for="signin-profile">Profile</label>
          <select id="signin-profile" name="profileKey" autocomplete="off">
            <option value="">Choose profile</option>
            <option value="jasper">Jasper — Squishy Cottage</option>
            <option value="william">William — Dino Nerdzone</option>
          </select>

          <label for="signin-identifier">Email or username</label>
          <input id="signin-identifier" name="username" type="text" autocomplete="username" inputmode="email" required />

          <label for="signin-password">Password</label>
          <div class="password-wrap">
            <input id="signin-password" name="password" type="password" autocomplete="current-password" required />
            <button type="button" class="toggle-password" data-toggle-password="signin-password" aria-label="Show password" aria-pressed="false">Show</button>
          </div>

          <button class="primary-action" type="submit">Sign in</button>
        </form>
      </section>

      <section id="signup-panel" class="auth-panel" role="tabpanel" hidden>
        <h2>Sign up</h2>
        <form id="signup-form" class="auth-form" autocomplete="on" action="index.html" method="get">
          <label for="signup-profile">Profile</label>
          <select id="signup-profile" name="profileKey" autocomplete="off" required>
            <option value="">Choose profile</option>
            <option value="jasper">Jasper — Squishy Cottage</option>
            <option value="william">William — Dino Nerdzone</option>
          </select>

          <label for="signup-display">Display name</label>
          <input id="signup-display" name="name" type="text" autocomplete="name" required />

          <label for="signup-email">Email</label>
          <input id="signup-email" name="email" type="email" autocomplete="email" required />

          <label for="signup-username">Username</label>
          <input id="signup-username" name="username" type="text" autocomplete="username" required />

          <label for="signup-password">Password</label>
          <div class="password-wrap">
            <input id="signup-password" name="new-password" type="password" autocomplete="new-password" minlength="8" required />
            <button type="button" class="toggle-password" data-toggle-password="signup-password" aria-label="Show password" aria-pressed="false">Show</button>
          </div>

          <label for="signup-confirm">Confirm password</label>
          <div class="password-wrap">
            <input id="signup-confirm" name="confirm-password" type="password" autocomplete="new-password" minlength="8" required />
            <button type="button" class="toggle-password" data-toggle-password="signup-confirm" aria-label="Show password" aria-pressed="false">Show</button>
          </div>

          <button class="primary-action" type="submit">Create sign-in</button>
        </form>
      </section>

      <section id="reset-panel" class="auth-panel" role="tabpanel" hidden>
        <h2>Reset password</h2>
        <form id="reset-request-form" class="auth-form compact" autocomplete="on">
          <label for="reset-identifier">Email or username</label>
          <input id="reset-identifier" name="username" type="text" autocomplete="username" required />
          <button class="secondary-action" type="submit">Email code</button>
        </form>
        <form id="reset-complete-form" class="auth-form compact" autocomplete="on">
          <label for="reset-code">Reset code</label>
          <input id="reset-code" name="one-time-code" type="text" inputmode="numeric" autocomplete="one-time-code" required />

          <label for="reset-new-password">New password</label>
          <div class="password-wrap">
            <input id="reset-new-password" name="new-password" type="password" autocomplete="new-password" minlength="8" required />
            <button type="button" class="toggle-password" data-toggle-password="reset-new-password" aria-label="Show password" aria-pressed="false">Show</button>
          </div>

          <button class="primary-action" type="submit">Reset password</button>
        </form>
      </section>
    </section>
  </main>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/backend-bridge.js"></script>
  <script src="assets/js/auth-ui.js"></script>

<script src="js/ourspace-module-workshop.js"></script>
<script src="js/ourspace-gas-app.js"></script>
<script src="js/ourspace-pwa.js"></script>
</body>
</html>
